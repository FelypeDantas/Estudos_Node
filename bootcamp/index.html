<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Bootcamp</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Classificação de Heróis</h1>
    <div class="hero-input">
        <label for="nome">Nome do Herói:</label>
        <input type="text" id="nome" placeholder="Digite o nome do herói" required>
    </div>
    <div class="hero-input">
        <label for="xp">Experiência (XP):</label>
        <input type="number" id="xp" placeholder="Digite a XP do herói" required>
    </div>
    <button id="classificar">Classificar Herói</button>
    <button id="resetar">Resetar</button>

    <div class="result" id="resultado"></div>
    <script src="index.js"></script>
</body>

</html>
